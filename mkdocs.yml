site_name: Universal Hyperbolic Geometry Library
site_description: UHG — projective hyperbolic geometry for ML and anomaly detection
site_author: Zach Bovaird
repo_url: https://github.com/zbovaird/UHG-Library

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.highlight

nav:
  - Home: index.md
  - Repository map: MAP.md
  - Reference:
      - Public API (semver): reference/public-api.md
      - Stability & deprecation: reference/stability.md
      - Functions summary: reference/uhg_functions_summary.md
      - UHG reference notes: UHG_REFERENCE.md
      - UHG principles: UHG_PRINCIPLES.md
  - Development:
      - MCP server (optional): development/mcp.md
      - Implementation notes: development/IMPLEMENTATION.md
      - Vectorization: development/VECTORIZATION.md
  - Troubleshooting: TROUBLESHOOTING.md
  - Contributing: contributing.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - footnotes

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
