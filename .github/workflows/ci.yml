name: CI

on:
  push:
    branches: [main, "chore/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install torch CPU wheels first so setuptools never imports uhg before torch exists.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      # Smoke tests gate merges. The legacy suite still has failures; run it as a non-blocking signal.
      - name: Run smoke tests with coverage
        run: |
          pytest tests/test_package_smoke.py --cov=uhg --cov-report=xml --cov-report=term-missing -v

      - name: Run full test suite (informational)
        continue-on-error: true
        run: |
          pytest -q --tb=no

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: matrix.python-version == '3.12'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Black (check)
        run: black --check uhg

      # Full-package mypy is noisy until types are expanded; keep Black as the hard gate.
      - name: Mypy (non-blocking)
        continue-on-error: true
        run: mypy uhg
